<body class="bg-background text-on-background font-body min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#fffcf7]/80 dark:bg-stone-900/80 backdrop-blur-md flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-4">

</div>
<div class="flex items-center gap-2">

<section class="relative overflow-hidden rounded-xl bg-surface-container-low p-6">

<div class="space-y-1">

<h2 class="text-3xl font-headline font-bold text-on-surface">已安排 3 顿餐食</h2>

</div>
<div class="bg-primary text-on-primary p-3 rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">calendar_today</span>
</div>
</div>

<div class="absolute -right-4 -top-4 opacity-10">
<span class="material-symbols-outlined text-8xl" style="font-variation-settings: 'wght' 100;">restaurant_menu</span>
</div>
</section>
<!-- Latest Memories Feed Header -->
<div class="flex items-baseline justify-between px-2">

<span class="text-primary font-medium text-sm underline underline-offset-4">查看全部</span>
</div>

<span class="text-xs font-medium text-on-tertiary-container font-noto-serif">2023.10.24</span>
</div>
</div>
<div class="px-2 space-y-3">
<div class="flex items-center gap-2">
<span class="w-8 h-[1px] bg-primary-dim/30"></span>
<h4 class="text-lg font-headline font-bold text-on-surface">奶奶的生日蛋糕</h4>
</div>
<p class="text-on-surface-variant leading-relaxed text-sm italic">
                            “第一次尝试古法海绵蛋糕，口感竟然如此蓬松！奶奶脸上的笑容比蛋糕还要甜。”
                        </p>
<div class="flex gap-2 pt-2">
<span class="bg-secondary-container text-secondary text-[10px] px-2 py-0.5 rounded-full font-bold">#家传味道</span>
<span class="bg-surface-container-highest text-tertiary text-[10px] px-2 py-0.5 rounded-full font-bold">#甜品</span>
</div>
</div>
</div>
</article>
<!-- Memory Card 2 -->
<article class="scrapbook-angle-2 transition-transform hover:rotate-0 duration-300 ml-4">

</div>
<div class="px-2 space-y-3">
<div class="flex items-center gap-2">
<span class="w-8 h-[1px] bg-primary-dim/30"></span>

</div>
<p class="text-on-surface-variant leading-relaxed text-sm italic">
                            “采摘了院子里最新鲜的薄荷和生菜，清脆的口感仿佛把整个秋天都装进了碗里。”

<div class="flex gap-2 pt-2">
<span class="bg-secondary-container text-secondary text-[10px] px-2 py-0.5 rounded-full font-bold">#轻食</span>
<span class="bg-surface-container-highest text-tertiary text-[10px] px-2 py-0.5 rounded-full font-bold">#自家园子</span>
