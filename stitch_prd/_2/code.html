<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

                    fontFamily: {
                        "noto-serif": ["Noto Serif SC", "serif"],
                        "plus-jakarta-sans": ["Plus Jakarta Sans", "sans-serif"],
                        "headline": ["Noto Serif SC", "serif"],
                        "body": ["Plus Jakarta Sans", "sans-serif"],
                        "label": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px" },
                },
            },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fffcf7;
            color: #373831;
        }
        .serif-text {
            font-family: 'Noto Serif SC', serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen pb-24">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 bg-[#fffcf7]/80 dark:bg-stone-900/80 backdrop-blur-md shadow-[0px_12px_32px_rgba(55,56,49,0.06)] flex justify-between items-center px-6 h-16">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-[#a84533] p-2 hover:bg-[#fcf9f3] rounded-full transition-colors">arrow_back</button>
<h1 class="font-noto-serif text-xl font-bold text-[#a84533]">新建版本</h1>
</div>
<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-full bg-surface-container-highest border border-outline-variant/15 overflow-hidden">
<img class="w-full h-full object-cover" data-alt="User profile avatar" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBHJ6XZt672xfAZ3gqHMCN0mElZ9ucRgT2Gfy8YasdH57qHeXujC6F5dsAzw73zfK0A-m1408XxMrO9cViW7TtXGtTmPf98ee3zsLMAHfWdAJnoDcnT6JhVnEH3w0FeSm18QJR10RlIrDSuvhhaRq4uq7ovUySXNhKhkftibTP-MrdvvcfnbyYvyZ2xMJEJ9qpxSThzYc_znvVTcpunS0-Gv7hpgxScoRT_3aK8p7xWpM5s0jp6q-n7-xt-u1rZDf9gIetxneDm3sQ"/>
</div>
</div>
</header>
<main class="pt-24 px-4 md:px-8 max-w-4xl mx-auto space-y-8">
<!-- Header & Status Card -->
<section class="relative">
<div class="bg-surface-container-low rounded-2xl p-6 md:p-8 space-y-4">
<div class="flex items-center gap-2 px-3 py-1 bg-secondary-container text-secondary text-xs font-bold rounded-full w-fit">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">history</span>
                    基于 V1.0 原始版本进行改良
                </div>
<div class="space-y-2">
<label class="block font-noto-serif text-2xl font-bold tracking-tight text-on-surface">版本别名</label>
<input class="w-full bg-transparent border-b border-outline-variant/30 focus:border-primary focus:ring-0 text-lg py-2 transition-all outline-none placeholder:text-outline-variant/60" placeholder="例如：少糖健康版、菠萝改良版..." type="text"/>
</div>
</div>
<!-- Decorative "pasted note" effect -->
<div class="hidden md:block absolute -right-4 -top-4 w-32 h-32 bg-tertiary-container/40 rounded-lg -rotate-3 -z-10"></div>
</section>
<div class="grid grid-cols-1 md:grid-cols-12 gap-8">
<!-- Left Column: Ingredients -->
<div class="md:col-span-5 space-y-6">
<div class="bg-surface-container-lowest p-6 rounded-2xl shadow-[0px_12px_32px_rgba(55,56,49,0.04)] border border-surface-container-high">
<div class="flex items-center justify-between mb-6">
<h2 class="font-noto-serif text-xl font-bold flex items-center gap-2">
<span class="material-symbols-outlined text-primary">restaurant_menu</span>
                            配料清单
                        </h2>
<button class="material-symbols-outlined text-secondary text-lg">add_circle</button>
</div>
<div class="space-y-4">
<!-- Modified Ingredient -->
<div class="group relative bg-primary/5 p-4 rounded-xl border-l-4 border-primary transition-all">
<div class="flex justify-between items-start mb-1">
<span class="font-medium">细砂糖</span>
<div class="text-right">
<input class="w-16 bg-transparent border-none p-0 text-right font-bold text-primary focus:ring-0" type="text" value="30g"/>
<div class="text-[10px] text-primary/60 line-through">原 50g</div>
</div>
</div>
<p class="text-xs text-on-surface-variant italic">减少甜度，更健康</p>
</div>
<!-- Unchanged Ingredient -->
<div class="flex justify-between items-center p-4 bg-surface-container-low rounded-xl">
<span class="font-medium text-on-surface-variant">低筋面粉</span>
<input class="w-16 bg-transparent border-none p-0 text-right text-on-surface-variant focus:ring-0" type="text" value="200g"/>
</div>
<!-- Unchanged Ingredient -->
<div class="flex justify-between items-center p-4 bg-surface-container-low rounded-xl">
<span class="font-medium text-on-surface-variant">全脂牛奶</span>
<input class="w-16 bg-transparent border-none p-0 text-right text-on-surface-variant focus:ring-0" type="text" value="120ml"/>
</div>
<!-- Added Ingredient -->
<div class="group relative bg-secondary/5 p-4 rounded-xl border-l-4 border-secondary transition-all">
<div class="flex justify-between items-start">
<span class="font-medium text-secondary">海盐</span>
<div class="text-right">
<input class="w-16 bg-transparent border-none p-0 text-right font-bold text-secondary focus:ring-0" type="text" value="2g"/>
<div class="text-[10px] text-secondary/60">新增</div>
</div>
</div>
</div>
</div>
</div>
</div>
<!-- Right Column: Steps & Tips -->
<div class="md:col-span-7 space-y-8">
<!-- Steps Section -->
<div class="space-y-6">
<h2 class="font-noto-serif text-xl font-bold flex items-center gap-2">
<span class="material-symbols-outlined text-primary">format_list_numbered</span>
                        烹饪步骤
                    </h2>
<div class="space-y-6">
<!-- Step 1 -->
<div class="flex gap-4">
<div class="flex-none w-8 h-8 rounded-full bg-surface-container-highest text-on-surface flex items-center justify-center font-bold text-sm">1</div>
<div class="flex-grow space-y-2">
<textarea class="w-full bg-surface-container-low border-none rounded-xl p-4 text-sm focus:ring-1 focus:ring-primary/20 resize-none" rows="2">将面粉与糖混合均匀，由于减少了糖量，混合过程更快。</textarea>
</div>
</div>
<!-- Step 2 - Modified -->
<div class="flex gap-4">
<div class="flex-none w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-bold text-sm">2</div>
<div class="flex-grow space-y-2">
<div class="bg-primary/5 border border-primary/10 rounded-xl p-4">
<textarea class="w-full bg-transparent border-none p-0 text-sm focus:ring-0 resize-none" rows="3">分三次加入牛奶和蛋液，最后加入新增的海盐。海盐能激发糖的层次感，这一步是风味改良的关键。</textarea>
<div class="mt-2 flex items-center gap-1 text-[10px] text-primary uppercase tracking-widest font-bold">
<span class="material-symbols-outlined text-xs">edit</span> Modified
                                    </div>
</div>
</div>
</div>
<!-- Step 3 -->
<div class="flex gap-4">
<div class="flex-none w-8 h-8 rounded-full bg-surface-container-highest text-on-surface flex items-center justify-center font-bold text-sm">3</div>
<div class="flex-grow space-y-2">
<textarea class="w-full bg-surface-container-low border-none rounded-xl p-4 text-sm focus:ring-1 focus:ring-primary/20 resize-none" rows="2">预热烤箱至180度，烘烤25分钟直到表面金黄。</textarea>
</div>
</div>
</div>
<button class="w-full py-3 border-2 border-dashed border-outline-variant/30 rounded-xl text-on-surface-variant text-sm font-medium hover:bg-surface-container-low transition-colors">
                        + 添加新步骤
                    </button>
</div>
<!-- Tips Section -->
<div class="bg-tertiary-container/30 p-6 rounded-2xl relative overflow-hidden">
<div class="absolute -right-6 -bottom-6 opacity-10">
<span class="material-symbols-outlined text-8xl">lightbulb</span>
</div>
<h2 class="font-noto-serif text-lg font-bold flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-tertiary">sticky_note_2</span>
                        小贴士
                    </h2>
<textarea class="w-full bg-transparent border-b border-tertiary/20 focus:border-tertiary focus:ring-0 text-sm py-2 transition-all outline-none min-h-[100px]" placeholder="在这里记录你的改良心得..."></textarea>
</div>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 w-full z-50 bg-[#fffcf7]/90 backdrop-blur-xl border-t border-[#babaaf]/15 px-6 py-4 flex items-center justify-between">
<div class="flex flex-col">
<span class="text-[10px] text-on-surface-variant uppercase tracking-widest font-bold">Current Target</span>
<span class="font-noto-serif font-bold text-primary">V1.1 版本草稿</span>
</div>
<button class="bg-[#a84533] text-white px-8 py-3 rounded-xl font-bold shadow-[0px_12px_32px_rgba(168,69,51,0.2)] active:scale-95 transition-all flex items-center gap-2">
            发布新版本
            <span class="material-symbols-outlined text-sm">send</span>
</button>
</div>
<!-- Background Decorative Elements -->
<div class="fixed top-20 -left-20 w-64 h-64 bg-primary/5 rounded-full blur-3xl -z-20"></div>
<div class="fixed bottom-40 -right-20 w-96 h-96 bg-secondary/5 rounded-full blur-3xl -z-20"></div>
</body></html>
